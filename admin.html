<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Biz Expo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=6">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 100px auto;
            padding: 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .admin-table-container {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        th {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
            color: var(--primary);
        }
        tr:hover {
            background: rgba(255,255,255,0.02);
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
        }
        
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <header class="glass-header">
        <div class="header-content">
            <div class="logo-section">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 15px;">
                    <img src="assets/logo.png" alt="Biz Expo Logo" class="logo">
                    <div class="header-text">
                        <h1 style="color: white; -webkit-text-fill-color: white;">Biz Expo</h1>
                        <p class="subtitle">Admin Dashboard</p>
                    </div>
                </a>
            </div>
            <div class="header-right" style="display: flex; gap: 10px;">
                <a id="download-btn" href="/api/export" class="primary-btn small" style="background: linear-gradient(135deg, #10b981, #059669);">Download CSV</a>
                <button onclick="logout()" class="primary-btn small" style="background: linear-gradient(135deg, #ef4444, #dc2626);">Logout</button>
            </div>
        </div>
    </header>

    <main class="admin-container">
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('events')">Event Registrations</button>
            <button class="tab-btn" onclick="switchTab('stalls')">Stall Bookings</button>
        </div>
        
        <div class="admin-header">
            <h2 id="current-title" class="section-title" style="margin-bottom: 0;">Event Registrations</h2>
            <button class="primary-btn small" onclick="loadData()">Refresh Data</button>
        </div>
        
        <div class="admin-table-container tab-content active" id="events-tab">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th>Registered For</th>
                        <th>Amount Paid</th>
                    </tr>
                </thead>
                <tbody id="events-body">
                    <tr><td colspan="7" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="admin-table-container tab-content" id="stalls-tab">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Contact Name</th>
                        <th>Company</th>
                        <th>Details</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Package</th>
                        <th>Amount Paid</th>
                    </tr>
                </thead>
                <tbody id="stalls-body">
                    <tr><td colspan="8" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        let currentTab = 'events';
        
        function switchTab(tab) {
            currentTab = tab;
            
            // UI classes
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            
            // Dynamic titles & links
            if(tab === 'events') {
                document.getElementById('current-title').textContent = "Event Registrations";
                document.getElementById('download-btn').href = "/api/export";
            } else {
                document.getElementById('current-title').textContent = "Stall Bookings";
                document.getElementById('download-btn').href = "/api/export?type=stalls";
            }
            
            loadData();
        }

        async function loadData() {
            if(currentTab === 'events') {
                await loadEvents();
            } else {
                await loadStalls();
            }
        }
        
        async function loadEvents() {
            const tbody = document.getElementById('events-body');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Loading...</td></tr>';
            try {
                const response = await fetch('/api/members');
                if (response.status === 401) { window.location.href = 'admin-login.html'; return; }
                const data = await response.json();
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No event registrations found.</td></tr>';
                    return;
                }
                
                let html = '';
                data.forEach(m => {
                    html += `<tr>
                        <td>${new Date(m.timestamp).toLocaleString()}</td>
                        <td>${m.name}</td>
                        <td>${m.email}</td>
                        <td>${m.phone}</td>
                        <td>${m.address}</td>
                        <td><span style="color:var(--accent); font-weight:600;">${m.item_name}</span></td>
                        <td>₹${m.amount}</td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#ef4444;">Error loading data.</td></tr>';
            }
        }
        
        async function loadStalls() {
            const tbody = document.getElementById('stalls-body');
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Loading...</td></tr>';
            try {
                const response = await fetch('/api/stalls');
                if (response.status === 401) { window.location.href = 'admin-login.html'; return; }
                const data = await response.json();
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No stall bookings found.</td></tr>';
                    return;
                }
                
                let html = '';
                data.forEach(m => {
                    html += `<tr>
                        <td>${new Date(m.timestamp).toLocaleString()}</td>
                        <td>${m.name}</td>
                        <td style="color:#fff; font-weight:600;">${m.company_name}</td>
                        <td style="max-width: 200px; font-size:0.9rem; color:var(--text-muted);">${m.company_desc}</td>
                        <td>${m.email}</td>
                        <td>${m.phone}</td>
                        <td><span style="color:var(--accent); font-weight:600;">${m.package_name}</span></td>
                        <td>₹${m.amount}</td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#ef4444;">Error loading data.</td></tr>';
            }
        }
        
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = 'admin-login.html';
        }
        
        // Load on start
        loadEvents();
    </script>
</body>
</html>
